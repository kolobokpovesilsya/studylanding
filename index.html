<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой проект</title>
  <link rel="stylesheet" href="/src/main.css">
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="header">
      <div class="container header__container">
        <div class="logo header__logo">
          <a href="/" class="logo__link">МойСайт</a>
        </div>
        
        <nav class="nav header__nav">
          <ul class="nav__list">
            <li class="nav__item">
              <a href="#home" class="nav__link">Главная</a>
            </li>
            <li class="nav__item">
              <a href="#about" class="nav__link">О нас</a>
            </li>
            <li class="nav__item">
              <a href="#services" class="nav__link">Услуги</a>
            </li>
            <li class="nav__item">
              <a href="#contacts" class="nav__link">Контакты</a>
            </li>
          </ul>
        </nav>

        <button class="burger header__burger" aria-label="Меню">
          <span class="burger__line"></span>
          <span class="burger__line"></span>
          <span class="burger__line"></span>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Section Hero -->
      <section class="brands" id="brands">
        <div class="brands__container ">
             <div class="brands__title">
                Trusted by 5,000+ Companies Worldwide
             </div>
             <div class="brands__list">
                <img src="src/assets/brands/google.svg" class="brands__item"></img>
                <img src="src/assets/brands/netflix.svg" class="brands__item"></img>
                <img src="src/assets/brands/airbnb.svg" class="brands__item"></img>
                <img src="src/assets/brands/amazon.svg" class="brands__item"></img>
                <img src="src/assets/brands/facebook.svg" class="brands__item"></img>
                <img src="src/assets/brands/grab.svg" class="brands__item"></img>
             </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container footer__container">
        <div class="footer__info">
          <div class="logo footer__logo">
            <a href="/" class="logo__link">МойСайт</a>
          </div>
          <p class="footer__copyright">© 2024 МойСайт. Все права защищены.</p>
        </div>

        <div class="footer__contacts">
          <h4 class="footer__title">Контакты</h4>
          <ul class="footer__list">
            <li class="footer__item">
              <a href="mailto:info@example.com" class="footer__link">info@example.com</a>
            </li>
            <li class="footer__item">
              <a href="tel:+71234567890" class="footer__link">+7 (123) 456-78-90</a>
            </li>
          </ul>
        </div>

        <div class="footer__social">
          <h4 class="footer__title">Соцсети</h4>
          <ul class="social footer__social-list">
            <li class="social__item">
              <a href="#" class="social__link social__link--vk" aria-label="ВКонтакте"></a>
            </li>
            <li class="social__item">
              <a href="#" class="social__link social__link--tg" aria-label="Telegram"></a>
            </li>
          </ul>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
